services:
  - type: web
    name: pharmacy-backend
    env: node
    plan: free
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: JWT_SECRET
        value: "pharmacy_jwt_secret_key_prod_2026_super_secret"
      - key: JWT_REFRESH_SECRET
        value: "pharmacy_jwt_refresh_secret_key_prod_2026_super_secret"
      - key: PORT
        value: 10000

databases:
  - name: pharmacy-db
    plan: free
