services:
  - type: web
    name: pharmacy-backend
    env: node
    plan: free
    buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: pharmacy-db
    plan: free
