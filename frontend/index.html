<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pharmacy Management System — inventory, sales, prescriptions and reporting for retail pharmacies" />
    <title>PharmaSys — Pharmacy Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Critical CSS: ensures layout and color always render correctly regardless of Tailwind CSS build output -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; min-height: 100vh; }
      body {
        background-color: #F5F7F6;
        color: #15191C;
        font-family: 'Inter', system-ui, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        height: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        margin: 0;
        text-align: left;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
